name: Weather Data Sync

# 1. TRIGGER OPTIONS
on:
  schedule:
    # Runs at minute 0 of every hour (e.g., 1:00, 2:00, 3:00)
    - cron: '0 * * * *'  
  
  # Allows you to manually trigger the sync from the GitHub Actions tab
  workflow_dispatch:

# 2. THE EXECUTION STEPS
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull your code into the virtual machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install only the necessary libraries for the ETL script
      - name: Install dependencies
        run: |
          pip install pandas pydantic requests

      # Step 4: Run the actual ETL pipeline script
      - name: Run ETL Pipeline
        env:
          # This connects your stored GitHub Secret to the Python OS environment
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/etl_pipeline.py
