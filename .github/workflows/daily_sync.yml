name: Weather Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas pydantic requests
      - name: Run ETL
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/etl_pipeline.py